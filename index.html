<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Wajah AI - Super Fast</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading-bar { height: 4px; width: 100%; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loading-bar::after { content: ""; position: absolute; left: -50%; height: 100%; width: 50%; background: #22c55e; animation: loading 1.5s infinite; }
        @keyframes loading { from { left: -50%; } to { left: 100%; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col p-4">

    <div class="w-full max-w-md mx-auto bg-slate-900 border border-slate-800 p-4 rounded-2xl mb-4">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">AI KIOSK TERMINAL</h1>
            <p id="txt-db-status" class="text-[10px] text-amber-400 font-bold">Menghubungkan...</p>
        </div>
        <select id="pilihan-kegiatan" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-3 text-xs font-black text-white outline-none">
            <option value="Subuh">Jamaah Subuh</option>
            <option value="Dzuhur">Jamaah Dzuhur</option>
            <option value="Ashar">Jamaah Ashar</option>
            <option value="Maghrib">Jamaah Maghrib</option>
            <option value="Isya">Jamaah Isya</option>
            <option value="Quranan">Ngaji Bakdo Subuh</option>
            <option value="PDF 1">Sekolah Jam 1</option>
            <option value="PDF 2">Sekolah Jam 2</option>
            <option value="PDF 3">Sekolah Jam 3</option>
        </select>
    </div>

    <div class="relative w-full max-w-md mx-auto aspect-square bg-slate-900 border-2 border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
        <video id="video-selfie" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div id="kotak-scan" class="w-64 h-64 border-2 border-dashed border-cyan-500/30 rounded-3xl flex items-center justify-center">
                <span id="instruksi" class="text-[10px] bg-slate-950/80 text-cyan-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Memuat AI...</span>
            </div>
        </div>
    </div>

    <!-- POP-UP SUKSES (TAMPILAN RINCIAN SALDO) -->
    <div id="pop-success" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl flex items-center justify-center p-6 hidden z-50">
        <div class="bg-slate-900 border border-emerald-500/50 w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="bg-emerald-500 p-4 text-center">
                <i class="fa-solid fa-circle-check text-white text-3xl mb-1"></i>
                <h2 id="txt-nama-sukses" class="text-white font-black text-xl uppercase tracking-tight">NAMA SANTRI</h2>
            </div>
            
            <div class="p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                    <span class="text-slate-400 text-xs font-bold uppercase">Saldo Sebelumnya</span>
                    <span id="saldo-lama" class="text-white font-black text-lg">Rp 0</span>
                </div>
                
                <div class="flex justify-between items-center bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20">
                    <div>
                        <span class="text-emerald-400 text-[10px] font-black uppercase block">Poin Hari Ini</span>
                        <span id="poin-hari-ini" class="text-emerald-400 font-black text-2xl">0</span>
                    </div>
                    <div class="text-right">
                        <span class="text-slate-400 text-[10px] font-black uppercase block">Total Saldo Sekarang</span>
                        <span id="saldo-baru" class="text-white font-black text-2xl">Rp 0</span>
                    </div>
                </div>

                <p id="pesan-motivasi" class="text-center text-slate-400 text-[11px] italic px-4">Mengupdate data...</p>
                
                <div class="loading-bar rounded-full"></div>
                <p class="text-[9px] text-center text-slate-500 font-bold uppercase tracking-widest">Kamera aktif kembali dalam 5 detik</p>
            </div>
        </div>
    </div>

    <!-- POP-UP WARNING (ANTI-SPAM) -->
    <div id="pop-warning" class="fixed inset-0 bg-slate-950/90 flex items-center justify-center p-8 hidden z-50">
        <div class="bg-amber-500 text-slate-950 w-full max-w-xs p-6 rounded-3xl text-center shadow-2xl">
            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
            <h3 id="txt-nama-peringatan" class="font-black text-lg uppercase">NAMA SANTRI</h3>
            <p class="font-bold text-sm">SUDAH ABSEN PADA SESI INI!</p>
        </div>
    </div>

    <canvas id="canvas-capture" class="hidden"></canvas>

    <script>
        const URL_ABSENSI = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        let video = document.getElementById('video-selfie');
        let label = document.getElementById('instruksi');
        let dbStatus = document.getElementById('txt-db-status');
        let isProcessing = false;
        let databaseSantriSiap = [];

        // LOAD AI MODELS
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
                await ambilDatabaseSantri();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                label.innerText = "HADAPKAN WAJAH";

                // LOOP SCANNING MILI DETIK
                setInterval(async () => {
                    if (isProcessing || databaseSantriSiap.length === 0) return;
                    const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                                             .withFaceLandmarks().withFaceDescriptor();
                    if (deteksi) {
                        verifikasiWajah(deteksi.descriptor);
                    }
                }, 200);
            } catch (e) { label.innerText = "AI ERROR"; }
        });

        async function ambilDatabaseSantri() {
            try {
                const res = await fetch(`${URL_ABSENSI}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    // PRE-PARSING KE FLOAT32ARRAY UNTUK SPEED MILI DETIK
                    databaseSantriSiap = json.data.map(s => ({
                        ...s,
                        descriptor: s.vektor ? new Float32Array(Object.values(JSON.parse(s.vektor))) : null
                    })).filter(s => s.descriptor !== null);
                    dbStatus.innerText = "🟢 KIOSK READY";
                }
            } catch (e) { dbStatus.innerText = "🔴 OFFLINE"; }
        }

        async function verifikasiWajah(descriptorKamera) {
            let ditemukan = null;
            let jarakTerkecil = 0.45; 

            for (let santri of databaseSantriSiap) {
                const jarak = faceapi.euclideanDistance(descriptorKamera, santri.descriptor);
                if (jarak < jarakTerkecil) {
                    jarakTerkecil = jarak;
                    ditemukan = santri;
                }
            }

            if (ditemukan) {
                const kegiatan = document.getElementById('pilihan-kegiatan').value;
                const storageKey = `absen_${new Date().toISOString().split('T')[0]}_${ditemukan.nik}_${kegiatan}`;

                // ANTI-SPAM LOKAL
                if (localStorage.getItem(storageKey)) {
                    showWarning(ditemukan.nama);
                    return;
                }

                isProcessing = true;
                localStorage.setItem(storageKey, "1");
                showSuccess(ditemukan);
            }
        }

        function showSuccess(santri) {
            document.getElementById('txt-nama-sukses').innerText = santri.nama;
            document.getElementById('pop-success').classList.remove('hidden');
            
            // Ambil Foto
            const canvas = document.getElementById('canvas-capture');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const foto = canvas.toDataURL('image/jpeg', 0.5);

            // POST ke Server (Background)
            fetch(URL_ABSENSI, {
                method: 'POST',
                body: JSON.stringify({
                    aksi: "absen_santri",
                    nik: santri.nik,
                    kegiatan: document.getElementById('pilihan-kegiatan').value,
                    foto: foto
                })
            })
            .then(r => r.json())
            .then(res => {
                if (res.status === "success") {
                    // Tampilkan angka positif (Math.abs)
                    const sLama = Math.abs(Math.round(res.realtime.saldoLama));
                    const sBaru = Math.abs(Math.round(res.realtime.saldoBaru));
                    
                    document.getElementById('saldo-lama').innerText = "Rp " + sLama.toLocaleString('id-ID');
                    document.getElementById('saldo-baru').innerText = "Rp " + sBaru.toLocaleString('id-ID');
                    document.getElementById('poin-hari-ini').innerText = res.realtime.poin;
                    document.getElementById('pesan-motivasi').innerText = "Data berhasil disinkronkan!";
                }
            });

            // JEDA 5 DETIK UNTUK MEMBACA
            setTimeout(() => {
                document.getElementById('pop-success').classList.add('hidden');
                resetState();
            }, 5000);
        }

        function showWarning(nama) {
            isProcessing = true;
            document.getElementById('txt-nama-peringatan').innerText = nama;
            document.getElementById('pop-warning').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('pop-warning').classList.add('hidden');
                resetState();
            }, 2500);
        }

        function resetState() {
            isProcessing = false;
            document.getElementById('saldo-lama').innerText = "Memuat...";
            document.getElementById('saldo-baru').innerText = "Memuat...";
            document.getElementById('poin-hari-ini').innerText = "0";
        }
    </script>
</body>
</html>
