<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Kiosk Wajah AI - Pakem Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between p-4">

    <div class="w-full max-w-md mx-auto bg-slate-900 border border-slate-800 p-4 rounded-2xl flex flex-col gap-2 shadow-lg">
        <div class="flex justify-between items-center">
            <h1 class="text-xs font-black text-cyan-400 uppercase tracking-wider"><i class="fa-solid fa-face-viewfinder mr-1"></i> TERMINAL KIOSK AI</h1>
            <p id="txt-db-status" onclick="ambilDatabaseSantri(true)" class="text-[11px] text-amber-400 font-bold animate-pulse cursor-pointer">Menghubungkan...</p>
        </div>
        <select id="pilihan-kegiatan" class="w-full bg-slate-950 border-2 border-slate-700 rounded-xl px-3 py-3 text-xs font-black text-white outline-none">
            <option value="Subuh">Jamaah Subuh</option>
            <option value="Dzuhur">Jamaah Dzuhur</option>
            <option value="Ashar">Jamaah Ashar</option>
            <option value="Maghrib">Jamaah Maghrib</option>
            <option value="Isya">Jamaah Isya</option>
            <option value="Quranan">Ngaji al-Qur'an</option>
            <option value="PDF 1">Sekolah PDF 1</option>
            <option value="PDF 2">Sekolah PDF 2</option>
            <option value="Belajar">Jam Belajar</option>
        </select>
    </div>

    <div class="w-full max-w-md mx-auto my-auto flex flex-col justify-center items-center">
        <div class="relative w-full aspect-square bg-slate-900 border-2 border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
            <video id="video-selfie" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div id="kotak-scan" class="w-64 h-64 border-4 border-dashed border-cyan-500/40 rounded-3xl flex items-center justify-center transition-all duration-300">
                    <span id="instruksi" class="text-xs bg-slate-950/90 text-cyan-400 px-4 py-2 rounded-xl font-black uppercase tracking-widest border border-cyan-500/30">Memuat AI...</span>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas-capture" class="hidden"></canvas>

    <!-- POP-UP SUKSES -->
    <div id="pop-success" class="fixed inset-0 bg-slate-950/90 backdrop-blur-lg flex items-center justify-center p-6 hidden z-50">
        <div class="bg-gradient-to-b from-emerald-500 to-teal-600 text-slate-950 w-full max-w-md p-6 rounded-3xl text-center shadow-2xl border-2 border-emerald-400">
            <span class="text-xs font-black tracking-widest block opacity-85 uppercase">ABSENSI BERHASIL</span>
            <span class="font-black text-2xl block mt-1 tracking-wide uppercase border-b border-slate-950/20 pb-3" id="txt-nama-sukses">...</span>
            <div class="mt-4 bg-slate-950/20 rounded-2xl p-4 flex flex-col gap-1 text-center">
                <span class="text-[10px] font-black tracking-widest text-slate-950 opacity-80 uppercase">SALDO TABUNGAN</span>
                <span id="pop-nominal-tabungan" class="text-3xl font-black text-white tracking-wide">Rp 0</span>
                <p id="pop-pesan-motivasi" class="text-xs font-bold text-slate-900 mt-2 bg-white/40 px-3 py-2.5 rounded-xl italic"></p>
            </div>
        </div>
    </div>

    <script>
        const URL_ABSENSI = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        let video = document.getElementById('video-selfie');
        let label = document.getElementById('instruksi');
        let kotakScan = document.getElementById('kotak-scan');
        let dbStatus = document.getElementById('txt-db-status');
        let canvasCap = document.getElementById('canvas-capture');
        let isProcessing = false;
        let databaseSantri = [];

        async function ambilDatabaseSantri() {
            try {
                dbStatus.innerText = "🔄 Sinkron...";
                const res = await fetch(`${URL_ABSENSI}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    databaseSantri = json.data;
                    dbStatus.innerText = `🟢 Ready (${databaseSantri.length})`;
                }
            } catch (e) { dbStatus.innerText = "⚠️ Offline"; }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
            await ambilDatabaseSantri();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            label.innerText = "SCAN WAJAH ANDA";
            
            setInterval(async () => {
                if (isProcessing || !databaseSantri.length) return;
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if (detection) { verifikasiWajah(detection.descriptor); }
            }, 500);
        });

        async function verifikasiWajah(descriptor) {
            let matches = databaseSantri.map(s => ({
                nik: s.nik, nama: s.nama, 
                dist: faceapi.euclideanDistance(descriptor, Object.values(JSON.parse(s.vektor)))
            })).filter(m => m.dist < 0.45);

            if (matches.length > 0) {
                let found = matches.sort((a, b) => a.dist - b.dist)[0];
                isProcessing = true;
                
                // Tampilkan Loading Cepat
                document.getElementById('txt-nama-sukses').innerText = found.nama;
                document.getElementById('pop-nominal-tabungan').innerText = "Menghitung...";
                document.getElementById('pop-success').classList.remove('hidden');

                const snap = canvasCap.toDataURL('image/jpeg', 0.5);
                const res = await fetch(URL_ABSENSI, {
                    method: "POST",
                    body: JSON.stringify({
                        aksi: "absen_santri", nik: found.nik, 
                        kegiatan: document.getElementById('pilihan-kegiatan').value,
                        petugas: "KIOSK_AI", foto: snap
                    })
                });
                
                const data = await res.json();
                if (data.status === "success") {
                    // Gunakan Math.abs (PLUS) dan Format Rupiah
                    let sld = Math.abs(data.realtime.saldo);
                    let pn = Math.abs(data.realtime.poin);
                    
                    document.getElementById('pop-nominal-tabungan').innerText = "Rp " + sld.toLocaleString('id-ID');
                    document.getElementById('pop-pesan-motivasi').innerText = `Hebat ${found.nama.split(' ')[0]}! Kamu sudah ikut ${pn} kegiatan hari ini. Semangat!`;
                }

                // Hasil tampil tepat 5 detik
                setTimeout(() => {
                    document.getElementById('pop-success').classList.add('hidden');
                    isProcessing = false;
                }, 5000);
            }
        }
    </script>
</body>
</html>
