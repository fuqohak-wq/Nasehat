<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk Wajah AI - Akurat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overflow: hidden; touch-action: manipulation; }
        .video-container { position: relative; overflow: hidden; border-radius: 2rem; transform: translateZ(0); }
        /* Animasi Scan Line */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(34, 211, 238, 0.5);
            box-shadow: 0 0 15px 2px #22d3ee;
            top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex flex-col p-4 font-sans">

    <!-- HEADER: TOMBOL KEMBALI & STATUS -->
    <div class="flex justify-between items-center mb-4 bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
        <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold transition-all">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </a>
        <div class="text-right">
            <p id="txt-db-status" onclick="paksaUpdateDatabase()" class="text-[10px] text-cyan-400 font-black uppercase tracking-tighter cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-down mr-1"></i> Menyiapkan Data...
            </p>
        </div>
    </div>

    <!-- SPINNER OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center z-[100] hidden">
        <div class="w-16 h-16 border-4 border-slate-800 border-t-cyan-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-cyan-400 font-black text-xs tracking-widest uppercase animate-pulse">Proses Kalkulasi...</p>
    </div>

    <iframe id="iframe-tabungan" src="tabungan.html" class="hidden"></iframe>

    <!-- SELECT KEGIATAN -->
    <div class="mb-4">
        <select id="pilihan-kegiatan" class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl px-4 py-4 text-sm font-black text-white focus:border-cyan-500 outline-none shadow-xl">
            <option value="Subuh">Jamaah Subuh</option>
            <option value="Dzuhur">Jamaah Dzuhur</option>
            <option value="Ashar">Jamaah Ashar</option>
            <option value="Maghrib">Jamaah Maghrib</option>
            <option value="Isya">Jamaah Isya</option>
            <option value="Quranan">Ngaji Bakdo Subuh</option>
            <option value="PDF 1">Sekolah Jam 1</option>
            <option value="PDF 2">Sekolah Jam 2</option>
            <option value="PDF 3">Sekolah Jam 3</option>
            <option value="Belajar">Jam Belajar</option>
        </select>
    </div>

    <!-- AREA KAMERA (Dioptimalkan agar tidak lag) -->
    <div class="flex-1 flex flex-col items-center justify-center relative">
        <div class="video-container w-full max-w-[340px] aspect-square border-4 border-slate-800 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <video id="video-selfie" autoplay playsinline muted class="w-full h-full object-cover scale-x-[-1]"></video>
            <div class="scan-line" id="scanner-line"></div>
            
            <!-- Overlay Instruksi -->
            <div class="absolute inset-0 flex flex-col items-center justify-end pb-8 pointer-events-none">
                <div id="kotak-status" class="px-6 py-2 bg-slate-950/80 backdrop-blur-md rounded-full border border-cyan-500/30">
                    <p id="instruksi" class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-400">Inisialisasi AI...</p>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas-capture" class="hidden"></canvas>

    <!-- FOOTER: AKSES CEPAT -->
    <div class="grid grid-cols-2 gap-3 mt-6">
        <a href="orangtua.html" class="bg-rose-600/20 border border-rose-500/30 text-rose-400 font-black py-4 rounded-2xl text-[10px] uppercase text-center tracking-widest shadow-lg">
            <i class="fa-solid fa-heart mr-1"></i> Cek Foto
        </a>
        <button onclick="location.reload()" class="bg-slate-800 text-slate-300 font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest">
            <i class="fa-solid fa-sync mr-1"></i> Refresh AI
        </button>
    </div>

    <!-- POP-UP RESULT & WARNING (Sama Seperti Sebelumnya dengan sedikit perbaikan UI) -->
    <div id="pop-success" class="fixed inset-0 bg-slate-950/98 backdrop-blur-2xl flex items-center justify-center p-6 hidden z-[110]">
        <div class="bg-white text-slate-950 w-full max-w-sm p-6 rounded-[2.5rem] text-center shadow-2xl overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
            <span class="text-[10px] font-black tracking-[0.3em] block text-emerald-600 mb-2 uppercase">Absensi Berhasil</span>
            <h2 class="font-black text-2xl uppercase leading-tight mb-4" id="txt-nama-sukses">SANTRI</h2>
            
            <div class="bg-slate-100 rounded-3xl p-4 flex flex-col gap-2 mb-6">
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-slate-500">SALDO</span><span id="pop-saldo-kemarin" class="font-bold">0</span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-slate-500">BONUS</span><span id="pop-saldo-hari-ini" class="font-bold text-emerald-600">+0</span></div>
                <div class="border-t border-slate-200 mt-1 pt-2 flex justify-between items-center">
                    <span class="text-[10px] font-black text-slate-900">TOTAL TABUNGAN</span>
                    <span id="pop-total-saldo" class="text-xl font-black text-blue-700">Rp 0</span>
                </div>
            </div>
            <button onclick="tutupPopup()" class="w-full bg-slate-950 text-white font-black py-5 rounded-2xl text-xs uppercase tracking-[0.2em]">Selesai</button>
        </div>
    </div>

    <script>
        const URL_AKURAT = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        
        let video = document.getElementById('video-selfie');
        let label = document.getElementById('instruksi');
        let dbStatus = document.getElementById('txt-db-status');
        let loadingOverlay = document.getElementById('loading-overlay');
        let canvasCap = document.getElementById('canvas-capture');
        
        let isProcessing = false;
        let databaseSantri = [];
        let faceMatcher = null;

        // --- SISTEM CACHE DATA ---
        async function loadDatabase() {
            const cachedData = localStorage.getItem('santri_db_cache');
            if (cachedData) {
                databaseSantri = JSON.parse(cachedData);
                dbStatus.innerHTML = `🟢 MODE OFFLINE (${databaseSantri.length})`;
                updateAIModels();
                // Tetap fetch di background untuk update data terbaru tanpa mengganggu user
                refreshCacheSilently();
            } else {
                await paksaUpdateDatabase();
            }
        }

        async function paksaUpdateDatabase() {
            dbStatus.innerHTML = "🔄 MENGUNDUH DATA...";
            try {
                const res = await fetch(`${URL_AKURAT}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    databaseSantri = json.data;
                    localStorage.setItem('santri_db_cache', JSON.stringify(databaseSantri));
                    dbStatus.innerHTML = `🟢 DATABASE READY (${databaseSantri.length})`;
                    updateAIModels();
                }
            } catch (e) { dbStatus.innerHTML = "⚠️ KONEKSI GAGAL"; }
        }

        async function refreshCacheSilently() {
            try {
                const res = await fetch(`${URL_AKURAT}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    localStorage.setItem('santri_db_cache', JSON.stringify(json.data));
                    databaseSantri = json.data;
                    console.log("Cache updated in background");
                }
            } catch (e) {}
        }

        // --- SISTEM AI (ANTI-LAG) ---
        async function initAI() {
            const MODEL_URL = 'https://unpkg.com/@vladmandic/face-api/model';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 480 }, height: { ideal: 480 }, frameRate: { ideal: 20 } } 
            });
            video.srcObject = stream;
            
            label.innerText = "SIAP SCAN WAJAH";
            processFrame();
        }

        // Loop deteksi yang lebih ringan (requestAnimationFrame)
        async function processFrame() {
            if (!isProcessing && video.readyState === 4) {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ 
                    inputSize: 224, // Lebih kecil = Lebih cepat di HP
                    scoreThreshold: 0.6 
                })).withFaceLandmarks().withFaceDescriptor();

                if (detection) {
                    verifikasiWajah(detection.descriptor);
                }
            }
            requestAnimationFrame(processFrame);
        }

        async function verifikasiWajah(descriptorKamera) {
            let santriDitemukan = null;
            let jarakTerbaik = 0.40; // DIPERKETAT DARI 0.48 -> 0.40 AGAR TIDAK TERTUKAR

            for (let s of databaseSantri) {
                if (!s.vektor) continue;
                const vektorDb = new Float32Array(Object.values(JSON.parse(s.vektor)));
                const jarak = faceapi.euclideanDistance(descriptorKamera, vektorDb);
                
                if (jarak < jarakTerbaik) {
                    jarakTerbaik = jarak;
                    santriDitemukan = s;
                }
            }

            if (santriDitemukan) {
                prosesAbsen(santriDitemukan);
            }
        }

        async function prosesAbsen(santri) {
            isProcessing = true;
            const kegiatan = document.getElementById('pilihan-kegiatan').value;
            const storageKey = `done_${new Date().toISOString().split('T')[0]}_${santri.nik}_${kegiatan}`;

            if (localStorage.getItem(storageKey)) {
                label.innerText = "SUDAH ABSEN!";
                setTimeout(() => { isProcessing = false; label.innerText = "HADAPKAN WAJAH"; }, 2000);
                return;
            }

            label.innerText = "MENCOCOKKAN...";
            loadingOverlay.classList.remove('hidden');
            bunyiBeep(800, 0.2);

            // Capture Foto
            canvasCap.width = video.videoWidth;
            canvasCap.height = video.videoHeight;
            const ctx = canvasCap.getContext('2d');
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvasCap.width, 0, canvasCap.width, canvasCap.height);
            const foto = canvasCap.toDataURL('image/jpeg', 0.4);

            try {
                const res = await fetch(URL_AKURAT, {
                    method: "POST",
                    body: JSON.stringify({
                        aksi: "absen_santri",
                        nik: santri.nik,
                        kegiatan: kegiatan,
                        petugas: "KIOSK_MANDIRI",
                        foto: foto
                    })
                });
                const hasil = await res.json();
                
                if (hasil.realtime) {
                    localStorage.setItem(storageKey, "1");
                    tampilkanSukses(santri.nama, hasil.realtime);
                }
            } catch (e) {
                isProcessing = false;
                loadingOverlay.classList.add('hidden');
            }
        }

        function tampilkanSukses(nama, data) {
            document.getElementById('txt-nama-sukses').innerText = nama;
            document.getElementById('pop-saldo-kemarin').innerText = "Rp " + Math.round(data.saldoKemarin).toLocaleString('id-ID');
            document.getElementById('pop-saldo-hari-ini').innerText = "+ Rp " + Math.round(data.nominalHariIni).toLocaleString('id-ID');
            document.getElementById('pop-total-saldo').innerText = "Rp " + Math.round(data.saldoKemarin + data.nominalHariIni).toLocaleString('id-ID');
            
            loadingOverlay.classList.add('hidden');
            document.getElementById('pop-success').classList.remove('hidden');
        }

        function tutupPopup() {
            document.getElementById('pop-success').classList.add('hidden');
            isProcessing = false;
            label.innerText = "HADAPKAN WAJAH";
        }

        function bunyiBeep(freq, dur) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain); gain.connect(context.destination);
            osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, context.currentTime);
            osc.start(); osc.stop(context.currentTime + dur);
        }

        window.onload = () => {
            loadDatabase();
            initAI();
        };
    </script>
</body>
</html>
