<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Kiosk Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .video-container { transform: scaleX(-1); filter: brightness(1.1) contrast(1.1); }
        .loading-pulse { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col p-4 overflow-hidden">

    <!-- HEADER / TOMBOL KEMBALI DI ATAS -->
    <div class="w-full max-w-md mx-auto flex justify-between items-center mb-4">
        <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
            <i class="fa-solid fa-arrow-left mr-2"></i>KEMBALI
        </a>
        <div id="txt-db-status" class="text-[10px] font-mono text-cyan-400 bg-cyan-500/10 px-3 py-1 rounded-full border border-cyan-500/30">
            Checking System...
        </div>
    </div>

    <!-- SELECTION AREA -->
    <div class="w-full max-w-md mx-auto mb-4">
        <select id="pilihan-kegiatan" class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl px-4 py-4 text-sm font-black text-white outline-none focus:border-cyan-500 transition-all">
            <option value="Subuh">Jamaah Subuh</option>
            <option value="Dzuhur">Jamaah Dzuhur</option>
            <option value="Ashar">Jamaah Ashar</option>
            <option value="Maghrib">Jamaah Maghrib</option>
            <option value="Isya">Jamaah Isya</option>
            <option value="Quranan">Ngaji al-Qur'an Bakdo Subuh</option>
            <option value="PDF 1">Sekolah PDF 1</option>
            <option value="PDF 2">Sekolah PDF 2</option>
            <option value="PDF 3">Sekolah PDF 3</option>
            <option value="Belajar">Jam Belajar</option>
        </select>
    </div>

    <!-- CAMERA AREA -->
    <div class="relative w-full max-w-md aspect-square mx-auto bg-slate-900 rounded-[3rem] border-4 border-slate-800 overflow-hidden shadow-2xl">
        <video id="video-selfie" autoplay playsinline class="video-container w-full h-full object-cover"></video>
        
        <!-- Overlay Scan -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
            <div id="scan-box" class="w-72 h-72 border-2 border-cyan-500/30 rounded-[2rem] relative transition-all duration-500">
                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-cyan-400 rounded-tl-lg"></div>
                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-cyan-400 rounded-tr-lg"></div>
                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-cyan-400 rounded-bl-lg"></div>
                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-cyan-400 rounded-br-lg"></div>
            </div>
            <p id="instruksi" class="mt-6 text-xs font-black tracking-widest text-cyan-400 uppercase bg-slate-950/80 px-6 py-2 rounded-full border border-cyan-500/20">
                Initialising AI...
            </p>
        </div>
    </div>

    <div class="mt-auto w-full max-w-md mx-auto pt-4 flex flex-col gap-3">
        <a href="orangtua.html" class="w-full bg-rose-600/10 border border-rose-500/30 text-rose-400 font-bold py-3 rounded-2xl text-center text-xs uppercase tracking-widest">
            <i class="fa-solid fa-camera-retro mr-2"></i>Cek Foto Harian
        </a>
    </div>

    <!-- MODAL HASIL -->
    <div id="pop-success" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl flex items-center justify-center p-6 hidden z-[100]">
        <div class="bg-slate-900 border border-emerald-500/30 w-full max-w-sm p-8 rounded-[2.5rem] text-center shadow-2xl">
            <div class="w-20 h-20 bg-emerald-500 rounded-full mx-auto mb-4 flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.4)]">
                <i class="fa-solid fa-check text-3xl text-slate-950"></i>
            </div>
            <h2 class="text-xs font-black text-emerald-400 tracking-[0.3em] uppercase mb-1">BERHASIL ABSEN</h2>
            <h1 id="txt-nama-sukses" class="text-2xl font-black text-white uppercase mb-6 tracking-tight">NAMA SANTRI</h1>
            
            <div class="bg-slate-950/50 rounded-3xl p-5 mb-6 border border-white/5">
                <div class="flex justify-between text-[10px] text-slate-400 mb-1 uppercase font-bold tracking-tighter">
                    <span>Saldo Kemarin</span>
                    <span>Tambahan</span>
                </div>
                <div class="flex justify-between items-center mb-3">
                    <span id="pop-saldo-kemarin" class="text-sm font-bold text-white">Rp 0</span>
                    <span id="pop-saldo-hari-ini" class="text-sm font-bold text-emerald-400">+Rp 0</span>
                </div>
                <div class="h-px bg-white/10 w-full mb-3"></div>
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">Total Tabungan</p>
                <p id="pop-total-saldo" class="text-3xl font-black text-cyan-400">Rp 0</p>
            </div>
            <button onclick="tutupPopup()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-2xl text-sm uppercase tracking-widest active:scale-95 transition-all">LANJUTKAN</button>
        </div>
    </div>

    <!-- SPINNER -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-[110] hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
            <p class="text-white text-[10px] font-black mt-4 tracking-widest opacity-50 uppercase">Menyimpan Data...</p>
        </div>
    </div>

    <canvas id="canvas-capture" class="hidden"></canvas>
    <iframe id="iframe-tabungan" src="tabungan.html" class="hidden"></iframe>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        let databaseSantri = [];
        let isProcessing = false;
        let lastDetectedNik = "";
        let detectionStreak = 0; // Untuk akurasi ganda
        
        const video = document.getElementById('video-selfie');
        const label = document.getElementById('instruksi');
        const dbStatus = document.getElementById('txt-db-status');
        const canvasCap = document.getElementById('canvas-capture');

        // 1. CARA CEPAT: LOAD DATABASE DARI CACHE
        async function loadDatabase() {
            const cachedData = localStorage.getItem('db_santri_v1');
            if (cachedData) {
                databaseSantri = JSON.parse(cachedData);
                dbStatus.innerText = `READY: ${databaseSantri.length} SANTRI`;
                syncDatabaseBackground(); // Update background
            } else {
                dbStatus.innerText = "SYNCING CLOUD...";
                await syncDatabaseBackground();
            }
        }

        async function syncDatabaseBackground() {
            try {
                const res = await fetch(`${API_URL}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    databaseSantri = json.data;
                    localStorage.setItem('db_santri_v1', JSON.stringify(json.data));
                    dbStatus.innerText = `READY: ${databaseSantri.length} SANTRI`;
                }
            } catch (e) { dbStatus.innerText = "OFFLINE MODE"; }
        }

        // 2. MULAI AI
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                label.innerText = "LOADING MODELS...";
                const MODEL_URL = 'https://unpkg.com/@vladmandic/face-api/model';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                await loadDatabase();
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    } 
                });
                video.srcObject = stream;
                label.innerText = "POSISIKAN WAJAH";

                // Loop deteksi (Interval 200ms agar HP tidak lag)
                setInterval(detectFace, 200);
            } catch (e) { label.innerText = "KAMERA ERROR"; }
        });

        async function detectFace() {
            if (isProcessing || video.paused || databaseSantri.length === 0) return;

            // Gunakan TinyFaceDetector dengan inputSize kecil agar ringan
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                                        .withFaceLandmarks()
                                        .withFaceDescriptor();

            if (detection) {
                matchFace(detection.descriptor);
            } else {
                detectionStreak = 0;
                lastDetectedNik = "";
            }
        }

        // 3. MATCHING DENGAN AKURASI TINGGI
        function matchFace(descriptor) {
            let bestMatch = { nik: "", nama: "", distance: 1.0 };
            const THRESHOLD_PRECISION = 0.42; // Lebih rendah = lebih akurat

            for (const santri of databaseSantri) {
                const dbVector = new Float32Array(Object.values(JSON.parse(santri.vektor)));
                const dist = faceapi.euclideanDistance(descriptor, dbVector);
                if (dist < bestMatch.distance) {
                    bestMatch = { nik: santri.nik, nama: santri.nama, distance: dist };
                }
            }

            if (bestMatch.distance < THRESHOLD_PRECISION) {
                // SISTEM STREAK: Harus terdeteksi orang yang sama 2x berturut-turut
                if (bestMatch.nik === lastDetectedNik) {
                    detectionStreak++;
                } else {
                    detectionStreak = 1;
                    lastDetectedNik = bestMatch.nik;
                }

                if (detectionStreak >= 2) {
                    executeAbsen(bestMatch);
                }
            }
        }

        async function executeAbsen(santri) {
            isProcessing = true;
            detectionStreak = 0;
            const kegiatan = document.getElementById('pilihan-kegiatan').value;
            const key = `absen_${new Date().toISOString().split('T')[0]}_${santri.nik}_${kegiatan}`;

            if (localStorage.getItem(key)) {
                label.innerText = "SUDAH ABSEN HARI INI";
                setTimeout(() => { isProcessing = false; label.innerText = "POSISIKAN WAJAH"; }, 3000);
                return;
            }

            label.innerText = "WAJAH TERVERIFIKASI!";
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            // Ambil Foto
            canvasCap.width = 320; // Perkecil foto agar upload cepat
            canvasCap.height = 320;
            const ctx = canvasCap.getContext('2d');
            ctx.translate(320, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 320, 320);
            const foto = canvasCap.toDataURL('image/jpeg', 0.5);

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        aksi: "absen_santri",
                        nik: santri.nik,
                        kegiatan: kegiatan,
                        petugas: "KIOSK_AI_V2",
                        foto: foto
                    })
                });
                const result = await res.json();
                
                if (result.status === "success") {
                    localStorage.setItem(key, "1");
                    showSuccess(santri.nama, result.realtime);
                }
            } catch (e) {
                alert("Gagal koneksi server");
                isProcessing = false;
            }
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function showSuccess(nama, data) {
            document.getElementById('txt-nama-sukses').innerText = nama;
            document.getElementById('pop-saldo-kemarin').innerText = "Rp " + Math.round(data.saldoKemarin).toLocaleString('id-ID');
            document.getElementById('pop-saldo-hari-ini').innerText = "+Rp " + Math.round(data.nominalHariIni).toLocaleString('id-ID');
            document.getElementById('pop-total-saldo').innerText = "Rp " + Math.round(data.saldoKemarin + data.nominalHariIni).toLocaleString('id-ID');
            document.getElementById('pop-success').classList.remove('hidden');
            
            // Suara Beep Berhasil
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 880;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function tutupPopup() {
            document.getElementById('pop-success').classList.add('hidden');
            isProcessing = false;
            label.innerText = "POSISIKAN WAJAH";
        }
    </script>
</body>
</html>
