<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk AI - Ultra Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overflow: hidden; touch-action: manipulation; }
        #video-selfie { transform: scaleX(-1); object-fit: cover; border-radius: 2rem; }
        .scan-anim { border: 2px solid rgba(34, 211, 238, 0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col p-4">

    <!-- NAVIGATION TOP -->
    <div class="w-full max-w-md mx-auto flex gap-2 mb-3">
        <a href="dashboard.html" class="flex-1 bg-slate-900 border border-slate-800 py-3 rounded-2xl text-[10px] font-black uppercase text-center tracking-widest text-slate-400 active:bg-slate-800">
            <i class="fa-solid fa-arrow-left mr-1"></i> Dashboard
        </a>
        <div id="txt-db-status" onclick="ambilDatabaseSantri(true)" class="flex-[1.5] bg-slate-900 border border-slate-800 py-3 rounded-2xl text-[10px] font-black uppercase text-center tracking-widest text-emerald-500 cursor-pointer">
            <i class="fa-solid fa-cloud mr-1"></i> Syncing...
        </div>
    </div>

    <!-- SPINNER OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center z-[100] hidden">
        <div class="w-16 h-16 border-4 border-slate-800 border-t-cyan-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-cyan-400 font-black text-[10px] tracking-widest uppercase">Mengkalkulasi...</p>
    </div>

    <iframe id="iframe-tabungan" src="tabungan.html" class="hidden"></iframe>

    <!-- SELECT KEGIATAN -->
    <div class="w-full max-w-md mx-auto mb-3">
        <select id="pilihan-kegiatan" class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl px-4 py-4 text-xs font-black text-cyan-400 outline-none shadow-xl">
            <option value="Subuh">Jamaah Subuh</option>
            <option value="Dzuhur">Jamaah Dzuhur</option>
            <option value="Ashar">Jamaah Ashar</option>
            <option value="Maghrib">Jamaah Maghrib</option>
            <option value="Isya">Jamaah Isya</option>
            <option value="Quranan">Ngaji Al-Qur'an</option>
            <option value="PDF 1">Sekolah PDF 1</option>
            <option value="PDF 2">Sekolah PDF 2</option>
            <option value="PDF 3">Sekolah PDF 3</option>
            <option value="Belajar">Jam Belajar</option>
        </select>
    </div>

    <!-- SCANNER VIEW -->
    <div class="relative w-full max-w-md aspect-[3/4] mx-auto bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl border-2 border-slate-800">
        <video id="video-selfie" autoplay playsinline class="w-full h-full"></video>
        
        <!-- Overlay Frame -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div id="kotak-scan" class="w-64 h-80 scan-anim rounded-[3rem] border-2 border-cyan-500/30"></div>
        </div>

        <div class="absolute bottom-6 left-0 right-0 text-center">
            <span id="instruksi" class="bg-slate-950/90 px-6 py-3 rounded-full text-[10px] font-black text-cyan-400 uppercase tracking-[0.2em] border border-cyan-500/30 shadow-2xl">Menunggu AI...</span>
        </div>
    </div>

    <!-- LINK MODE ORANG TUA -->
    <div class="w-full max-w-md mx-auto mt-4">
        <a href="orangtua.html" class="block w-full bg-rose-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase text-center tracking-widest shadow-lg shadow-rose-900/20 active:scale-95 transition-transform">
            <i class="fa-solid fa-heart animate-pulse mr-1"></i> Mode Orang Tua - Cek Foto
        </a>
    </div>

    <canvas id="canvas-capture" class="hidden"></canvas>

    <!-- POP-UP SUCCESS -->
    <div id="pop-success" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl flex items-center justify-center p-6 hidden z-[110]">
        <div class="bg-gradient-to-b from-emerald-500 to-teal-600 text-slate-950 w-full max-w-md p-6 rounded-[3rem] text-center shadow-2xl border-b-8 border-emerald-700">
            <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-check text-4xl text-white"></i>
            </div>
            <span class="text-[10px] font-black tracking-widest block opacity-70 uppercase">ABSENSI BERHASIL</span>
            <span class="font-black text-2xl block mt-1 tracking-tighter uppercase leading-none" id="txt-nama-sukses">...</span>
            
            <div class="mt-6 bg-slate-950/10 backdrop-blur-md rounded-[2rem] p-6 flex flex-col gap-4 shadow-inner">
                <div class="flex justify-between items-center opacity-80">
                    <span class="text-[9px] font-black uppercase tracking-widest">Saldo Kemarin</span>
                    <span id="pop-saldo-kemarin" class="font-black text-lg">Rp 0</span>
                </div>
                <div class="flex justify-between items-center text-white">
                    <span class="text-[9px] font-black uppercase tracking-widest">Reward Hari Ini</span>
                    <span id="pop-saldo-hari-ini" class="font-black text-lg">+ Rp 0</span>
                </div>
                <div class="flex flex-col pt-2 border-t border-white/10">
                    <span class="text-[9px] font-black uppercase tracking-widest opacity-70 mb-1">Total Tabungan Akurat</span>
                    <span id="pop-total-saldo" class="text-4xl font-black text-white tracking-tighter">Rp 0</span>
                </div>
            </div>
            <button onclick="tutupPopup()" class="mt-8 w-full bg-slate-950 text-white font-black py-5 rounded-2xl text-xs uppercase tracking-[0.3em] active:scale-95 transition-all shadow-2xl">LANJUTKAN SCAN</button>
        </div>
    </div>

    <script>
        const URL_AKURAT = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        let video = document.getElementById('video-selfie');
        let label = document.getElementById('instruksi');
        let loadingOverlay = document.getElementById('loading-overlay');
        let iframeTabungan = document.getElementById('iframe-tabungan');
        
        let isProcessing = false;
        let databaseSantri = JSON.parse(localStorage.getItem('db_santri_v3')) || [];
        let consecutiveMatches = 0;
        let lastIdentifiedNik = null;

        async function ambilDatabaseSantri(force = false) {
            if (!force && databaseSantri.length > 0) {
                document.getElementById('txt-db-status').innerText = `🟢 READY (${databaseSantri.length})`;
                return;
            }
            try {
                document.getElementById('txt-db-status').innerText = "🔄 SYNCING...";
                const res = await fetch(`${URL_AKURAT}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    databaseSantri = json.data;
                    localStorage.setItem('db_santri_v3', JSON.stringify(databaseSantri));
                    document.getElementById('txt-db-status').innerText = `🟢 READY (${databaseSantri.length})`;
                }
            } catch (e) { document.getElementById('txt-db-status').innerText = "⚠️ OFFLINE"; }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                label.innerText = "MENYIAPKAN AI...";
                // Load model pendeteksi & pengenal
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://unpkg.com/@vladmandic/face-api/model'); // Sensitivitas Angle
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://unpkg.com/@vladmandic/face-api/model');
                
                await ambilDatabaseSantri();
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                label.innerText = "SIAP SCAN WAJAH";

                // Loop AI Optimized (Tidak blocking UI thread)
                runAI();
            } catch (e) { label.innerText = "KAMERA ERROR"; }
        });

        async function runAI() {
            if (!isProcessing && video.readyState === 4) {
                // Gunakan TinyFaceDetector dengan inputSize 224 (Seimbang antara speed & akurasi angle)
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    verifikasiWajah(detection.descriptor);
                } else {
                    consecutiveMatches = 0;
                    lastIdentifiedNik = null;
                }
            }
            // Minta frame berikutnya (Anti-lag)
            requestAnimationFrame(() => setTimeout(runAI, 100)); 
        }

        async function verifikasiWajah(descriptorKamera) {
            let found = null; 
            let bestDist = 0.38; // THRESHOLD KETAT (Mencegah salah orang)

            for (let santri of databaseSantri) {
                const dbVektor = Object.values(JSON.parse(santri.vektor));
                const dist = faceapi.euclideanDistance(descriptorKamera, dbVektor);
                if (dist < bestDist) {
                    bestDist = dist;
                    found = santri;
                }
            }

            if (found) {
                // Double Check: Harus terdeteksi NIK yang sama 2x berturut-turut
                if (found.nik === lastIdentifiedNik) {
                    consecutiveMatches++;
                } else {
                    consecutiveMatches = 1;
                    lastIdentifiedNik = found.nik;
                }

                if (consecutiveMatches >= 2) {
                    executeAbsensi(found);
                }
            }
        }

        async function executeAbsensi(found) {
            isProcessing = true;
            loadingOverlay.classList.remove('hidden');
            consecutiveMatches = 0;

            const canvas = document.getElementById('canvas-capture');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const foto = canvas.toDataURL('image/jpeg', 0.5);

            try {
                const res = await fetch(URL_AKURAT, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        aksi: "absen_santri", 
                        nik: found.nik, 
                        kegiatan: document.getElementById('pilihan-kegiatan').value, 
                        foto: foto 
                    }) 
                });
                const resJson = await res.json();
                
                iframeTabungan.contentWindow.postMessage({
                    aksi: "minta_data_saldo",
                    nik: found.nik,
                    nama: found.nama,
                    realtimeSaldo: resJson.realtime.nominalHariIni,
                    realtimeSaldoKemarin: resJson.realtime.saldoKemarin,
                    realtimePoin: resJson.realtime.poin
                }, "*");
            } catch (e) { 
                loadingOverlay.classList.add('hidden'); 
                isProcessing = false; 
            }
        }

        window.addEventListener("message", (event) => {
            if (event.data.aksi === "kirim_saldo_ke_pop") {
                const d = event.data;
                loadingOverlay.classList.add('hidden');
                document.getElementById('pop-saldo-kemarin').innerText = "Rp " + Math.round(d.saldoKemarin).toLocaleString('id-ID');
                document.getElementById('pop-saldo-hari-ini').innerText = "Rp " + Math.round(d.saldoHariIni).toLocaleString('id-ID');
                document.getElementById('pop-total-saldo').innerText = "Rp " + Math.round(d.totalSaldo).toLocaleString('id-ID');
                document.getElementById('txt-nama-sukses').innerText = d.nama.toUpperCase();
                document.getElementById('pop-success').classList.remove('hidden');
                bunyikanBeep(1000, 0.2);
            }
        });

        function bunyikanBeep(f, d) {
            const a = new (window.AudioContext || window.webkitAudioContext)();
            const o = a.createOscillator();
            const g = a.createGain();
            o.connect(g); g.connect(a.destination);
            o.frequency.value = f; g.gain.setValueAtTime(0.2, a.currentTime);
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, a.currentTime + d);
            o.stop(a.currentTime + d);
        }

        function tutupPopup() {
            document.getElementById('pop-success').classList.add('hidden');
            isProcessing = false;
            lastIdentifiedNik = null;
        }
    </script>
</body>
</html>
