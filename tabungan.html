<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-transparent overflow-hidden text-slate-100">
    <script>
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") { listSaldoLokal = json.data; }
            } catch (e) { console.error("Gagal sinkron data", e); }
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi } = event.data;
            if (aksi === "minta_data_saldo" && nik) {
                let target = listSaldoLokal.find(s => s.nik?.toString().trim() === nik.toString().trim());
                // Pastikan nilai absolut (PLUS)
                let saldoFinal = target ? Math.abs(parseFloat(target.tabungan)) : 0;
                let poinHariIni = target ? Math.abs(parseInt(target.poin)) : 0;

                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoRaw: saldoFinal,
                    nama: nama,
                    nik: nik,
                    poinHarian: poinHariIni
                }, "*");
            }
        });

        unduhSemuaSaldo();
        setInterval(unduhSemuaSaldo, 3 * 60 * 1000); // Percepat sinkron tiap 3 menit
    </script>
</body>
</html>
