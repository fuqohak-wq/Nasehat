<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Widget Pengolah Data Tabungan</title>
</head>
<body style="background:transparent; margin:0; padding:0; overflow:hidden;">
    <script>
        // Menggunakan URL Web App tunggal milik Anda sesuai permintaan
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        // Unduh snapshot database awal saat aplikasi dimuat pertama kali
        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                
                if (json.status === "success") {
                    listSaldoLokal = json.data; // Menyimpan array berisi {nik, nama, vektor, saldo, poin}
                    console.log("Widget Tabungan: Berhasil memuat " + listSaldoLokal.length + " data dari Daftar_Santri_Saldo.");
                }
            } catch (e) {
                console.error("Widget Tabungan: Gagal menyinkronkan data cloud", e);
            }
        }

        // Mendengarkan instruksi dan data kiriman dari parent window (index.html)
        window.addEventListener("message", (event) => {
            const { nik, nama, aksi, realtimeSaldo, realtimePoin } = event.data;

            if (aksi === "minta_data_saldo" && nik) {
                let NIK_Target = nik.toString().trim();
                
                // Cari data santri dari database lokal sebelum dia melakukan absen teranyar
                let dataSantri = listSaldoLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);
                
                // Saldo sebelum transaksi hari ini diambil dari properti .saldo (sesuai output hasilData code.gs)
                let saldoKemarinRaw = dataSantri ? parseFloat(dataSantri.saldo) : 0;
                
                // Saldo setelah transaksi (realtime pasca-POST dari spreadsheet)
                let totalSaldoTerbaru = realtimeSaldo !== undefined ? parseFloat(realtimeSaldo) : saldoKemarinRaw;
                let poinHariIni = realtimePoin !== undefined ? parseInt(realtimePoin) : (dataSantri ? parseInt(dataSantri.poin) : 0);

                // Hitung selisih nominal transaksi absensi yang baru saja terjadi
                let saldoHariIniRaw = totalSaldoTerbaru - saldoKemarinRaw;
                
                // Kondisi pengaman jika rumus spreadsheet berjalan dinamis/akumulatif murni
                if (saldoHariIniRaw <= 0) {
                    // Jika di spreadsheet nilai saldo bersifat statis atau diupdate berkala via trigger, 
                    // buat asumsi nilai insentif kehadiran (misal Rp 5.000 atau sesuaikan kebutuhan visual Anda)
                    saldoHariIniRaw = 5000; 
                    saldoKemarinRaw = totalSaldoTerbaru - saldoHariIniRaw;
                    if (saldoKemarinRaw < 0) saldoKemarinRaw = 0;
                }

                // Kirim balik data hasil kalkulasi rapi ke index.html untuk ditampilkan pada pop-up
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoKemarin: saldoKemarinRaw,
                    saldoHariIni: saldoHariIniRaw,
                    totalSaldo: totalSaldoTerbaru,
                    nama: nama,
                    nik: NIK_Target,
                    poinHarian: poinHariIni
                }, "*");
            }
        });

        // Jalankan unduhan data di awal
        unduhSemuaSaldo();
        
        // Segarkan database lokal di latar belakang setiap 3 menit secara otomatis
        setInterval(unduhSemuaSaldo, 3 * 60 * 1000);
    </script>
</body>
</html>
