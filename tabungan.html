<!DOCTYPE html>
<html>
<body style="background:transparent;">
    <script>
        // Fungsi membersihkan angka dari format apapun & paksa jadi POSITIF
        function cleanToAbs(val) {
            if (!val) return 0;
            // Hapus karakter non-digit kecuali titik desimal awal
            let s = val.toString().replace(/Rp/gi, '').replace(/\s/g, '');
            // Atasi format titik ribuan Indonesia
            if (s.includes('.') && !s.includes(',')) {
                let parts = s.split('.');
                if (parts[parts.length - 1].length === 3) s = s.replace(/\./g, '');
            }
            return Math.abs(parseFloat(s) || 0);
        }

        window.addEventListener("message", (event) => {
            const d = event.data;
            if (d.aksi === "minta_data_saldo") {
                // AMBIL DATA
                let sk = cleanToAbs(d.realtimeSaldoKemarin); // Dari Spreadsheet 2
                let sh = cleanToAbs(d.realtimeSaldo);        // Dari Spreadsheet 1 (Nominal Hari Ini)
                
                // KALKULASI DI SINI (Penjumlahan Murni)
                let total = sk + sh;

                // Kirim balik ke Index.html
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoKemarin: sk,
                    saldoHariIni: sh,
                    totalSaldo: total,
                    nama: d.nama,
                    poinHarian: d.realtimePoin
                }, "*");
            }
        });
    </script>
</body>
</html>
