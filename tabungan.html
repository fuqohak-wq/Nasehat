<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-transparent overflow-hidden text-slate-100">

    <!-- TAMPILAN WIDGET INTEGRASI -->
    <div id="widget-tabungan" class="hidden transition-all duration-300 w-full bg-slate-950/80 border border-cyan-500/30 rounded-xl p-3 flex justify-between items-center bg-gradient-to-r from-slate-950 to-cyan-950/20">
        <div class="flex flex-col gap-0.5">
            <span id="label-nama" class="text-[11px] font-black tracking-wide text-white uppercase line-clamp-1">NAMA SANTRI</span>
            <span class="text-[9px] font-bold text-slate-400 tracking-wider">SALDO TABUNGAN</span>
        </div>
        <div class="text-right flex flex-col justify-center">
            <span id="label-nominal" class="text-base font-black text-emerald-400 tracking-wide">Rp 0</span>
        </div>
    </div>

    <script>
        // URL API Saldo Anda
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        // 1. OTO-DOWNLOAD: Saat widget dimuat, download semua data saldo ke memori lokal iframe
        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") {
                    listSaldoLokal = json.data;
                    console.log("Widget Tabungan: Berhasil sinkronisasi " + listSaldoLokal.length + " data saldo.");
                }
            } catch (e) {
                console.error("Widget Tabungan: Gagal memuat data dari cloud", e);
            }
        }

        // 2. MENDENGARKAN ISYARAT: Menunggu kiriman data dari index.html saat wajah terdeteksi
        window.addEventListener("message", (event) => {
            const { nik, nama, aksi } = event.data;

            // Jika index.html menyuruh menyembunyikan widget
            if (aksi === "sembunyikan") {
                document.getElementById('widget-tabungan').classList.add('hidden');
                return;
            }

            if (!nik) return;

            // Set nama santri yang dikirim dari scan wajah
            document.getElementById('label-nama').innerText = nama ? nama.toUpperCase() : "NAMA SANTRI";
            document.getElementById('widget-tabungan').classList.remove('hidden');

            // Cari nominal saldo berdasarkan NIK di data yang sudah diunduh tadi
            let NIK_Target = nik.toString().trim();
            let dataSantri = listSaldoLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);

            if (dataSantri) {
                // Tampilkan saldo asli (termasuk jika nilainya minus)
                document.getElementById('label-nominal').innerText = formatRupiah(dataSantri.tabungan);
            } else {
                // Fallback jika NIK tidak tercatat di sheet saldo
                document.getElementById('label-nominal').innerText = "Rp 0";
            }
        });

        // Fungsi pemformat Rupiah (Aman untuk angka minus)
        function formatRupiah(angka) {
            if (angka === undefined || angka === null || isNaN(angka)) return "Rp 0";
            let nilaiAngka = parseFloat(angka);
            let tandaMinus = nilaiAngka < 0 ? "-" : "";
            return tandaMinus + "Rp " + Math.abs(Math.round(nilaiAngka)).toLocaleString('id-ID');
        }

        // Jalankan unduhan otomatis di background saat file pertama terbuka
        unduhSemuaSaldo();
    </script>
</body>
</html>
