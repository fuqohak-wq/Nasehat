<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Widget Pengolah Data Tabungan</title>
</head>
<body style="background:transparent; margin:0; padding:0; overflow:hidden;">
    <script>
        // Mesin Pembersih Desimal & Minus Radikal
        function bersihkanDanUbahPositif(nilaiMentah) {
            if (nilaiMentah === undefined || nilaiMentah === null) return 0;
            // Ubah ke string, bersihkan spasi & simbol
            let str = nilaiMentah.toString().replace(/Rp/gi, '').replace(/\s/g, '');
            
            // Atasi format separator titik ribuan Indonesia
            if (str.includes('.') && !str.includes(',')) {
                let bagian = str.split('.');
                if (bagian[bagian.length - 1].length === 3) {
                    str = str.replace(/\./g, '');
                }
            }
            let angka = parseFloat(str) || 0;
            return Math.abs(angka); // Konversi paksa menjadi POSITIF
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi, realtimeSaldo, realtimePoin, realtimeSaldoKemarin } = event.data;

            if (aksi === "minta_data_saldo" && nik) {
                // Ambil & paksa semua data menjadi bernilai positif
                let saldoKemarin = bersihkanDanUbahPositif(realtimeSaldoKemarin); 
                let saldoHariIni = bersihkanDanUbahPositif(realtimeSaldo); 
                let totalSaldo = saldoKemarin + saldoHariIni; // Penjumlahan di HTML

                let poinHarian = realtimePoin !== undefined ? parseInt(realtimePoin) : 0;

                // Kirim balik data mutlak ke index.html
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoKemarin: saldoKemarin,
                    saldoHariIni: saldoHariIni,
                    totalSaldo: totalSaldo,
                    nama: nama,
                    nik: nik,
                    poinHarian: poinHarian
                }, "*");
            }
        });
    </script>
</body>
</html>
