<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Widget Pengolah Data Tabungan</title>
</head>
<body style="background:transparent; margin:0; padding:0; overflow:hidden;">
    <script>
        // Endpoint utama searah dengan server backend Kiosk Anda
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxJ8zjyd5YLsPhpq52ntO95-Bn5gNJlKLHSozMZ1kWFJAOGir5co21ln3gpiVI9UCx2/exec";
        let listSantriLokal = [];

        // Ambil database di awal untuk memegang cache saldo awal sebelum absensi berjalan
        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") {
                    listSantriLokal = json.data;
                    console.log("Widget Tabungan: Sinkronisasi database berhasil.");
                }
            } catch (e) {
                console.error("Widget Tabungan: Gagal sync cloud.", e);
            }
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi, realtimeSaldo, realtimePoin } = event.data;

            if (aksi === "minta_data_saldo" && nik) {
                let NIK_Target = nik.toString().trim();
                
                // 1. Cari data di cache lokal (keadaan sebelum absen hari ini)
                let dataLokal = listSantriLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);
                
                // 2. Baca nilai dari spreadsheet via return objek doPost
                let totalSaldoTerbaru = realtimeSaldo !== undefined ? parseFloat(realtimeSaldo) : 0;
                let poinHariIni = realtimePoin !== undefined ? parseInt(realtimePoin) : 0;
                
                // 3. Rumus Estimasi Alokasi Saldo
                // Karena Kolom C spreadsheet adalah akumulasi total berjalan saat itu juga:
                let nominalPerKehadiran = 5000; // Sesuaikan dengan nilai insentif per kehadiran sistem Anda jika ada
                let saldoHariIniRaw = nominalPerKehadiran; 
                let saldoKemarinRaw = totalSaldoTerbaru - saldoHariIniRaw;
                
                if (saldoKemarinRaw < 0) {
                    saldoKemarinRaw = 0;
                    saldoHariIniRaw = totalSaldoTerbaru;
                }

                // Kirim balik hasil ekstraksi matematika ke parent window (index.html)
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoKemarin: saldoKemarinRaw,
                    saldoHariIni: saldoHariIniRaw,
                    totalSaldo: totalSaldoTerbaru,
                    nama: nama,
                    nik: NIK_Target,
                    poinHarian: poinHariIni
                }, "*");
            }
        });

        // Jalankan saat load awal
        unduhSemuaSaldo();
        // Segarkan antrean data lokal berkala tiap 3 menit
        setInterval(unduhSemuaSaldo, 3 * 60 * 1000);
    </script>
</body>
</html>
