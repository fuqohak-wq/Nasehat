<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-transparent overflow-hidden text-slate-100">

    <div id="widget-tabungan" class="hidden w-full bg-slate-950/80 border border-cyan-500/30 rounded-xl p-3 flex justify-between items-center bg-gradient-to-r from-slate-950 to-cyan-950/20">
        <div class="flex flex-col gap-0.5">
            <span id="label-nama" class="text-[11px] font-black tracking-wide text-white uppercase line-clamp-1">NAMA SANTRI</span>
            <span class="text-[9px] font-bold text-slate-400 tracking-wider">SALDO TABUNGAN</span>
        </div>
        <div class="text-right flex flex-col justify-center">
            <span id="label-nominal" class="text-base font-black text-emerald-400 tracking-wide">Rp 0</span>
        </div>
    </div>

    <script>
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") {
                    listSaldoLokal = json.data;
                    console.log("Widget Tabungan: Berhasil sinkronisasi " + listSaldoLokal.length + " data saldo.");
                }
            } catch (e) {
                console.error("Widget Tabungan: Gagal memuat data dari cloud", e);
            }
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi } = event.data;

            if (aksi === "minta_data_saldo" && nik) {
                let NIK_Target = nik.toString().trim();
                let dataSantri = listSaldoLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);
                let saldoFinal = dataSantri ? dataSantri.tabungan : 0;

                // Balikkan data saldo beserta NIK ke index.html untuk Pop-Up
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoRaw: saldoFinal,
                    nama: nama,
                    nik: NIK_Target
                }, "*");
            }
        });

        unduhSemuaSaldo();
        // Auto refresh data saldo dari cloud setiap 10 menit
        setInterval(unduhSemuaSaldo, 10 * 60 * 1000);
    </script>
</body>
</html>
