<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Widget Pengolah Data Tabungan</title>
</head>
<body style="background:transparent; margin:0; padding:0; overflow:hidden;">
    <script>
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") listSaldoLokal = json.data;
            } catch (e) { console.error("Sync Error", e); }
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi, realtimeSaldo, realtimePoin } = event.data;

            if (aksi === "minta_data_saldo" && nik) {
                let nikTarget = nik.toString().trim();
                let dataLama = listSaldoLokal.find(s => s.nik === nikTarget);
                
                // Saldo sebelum absen (dari cache lokal)
                let saldoKemarin = dataLama ? parseFloat(dataLama.saldo) : (parseFloat(realtimeSaldo) - 500);
                
                // Saldo total saat ini (dari respon realtime server)
                let totalSekarang = parseFloat(realtimeSaldo) || 0;
                
                // Reward hari ini
                let saldoHariIni = totalSekarang - saldoKemarin;
                if (saldoHariIni <= 0) saldoHariIni = 500; // Minimal reward jika sync delay

                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoKemarin: saldoKemarin,
                    saldoHariIni: saldoHariIni,
                    totalSaldo: totalSekarang,
                    nama: nama,
                    nik: nikTarget,
                    poinHarian: realtimePoin
                }, "*");
            }
        });

        unduhSemuaSaldo();
        setInterval(unduhSemuaSaldo, 2 * 60 * 1000); // Sync tiap 2 menit
    </script>
</body>
</html>
