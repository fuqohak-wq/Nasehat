<!DOCTYPE html>
<html>
<head>
    <script>
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        async function unduhData() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`);
                const json = await res.json();
                if (json.status === "success") {
                    listSaldoLokal = json.data;
                }
            } catch (e) {}
        }

        window.addEventListener("message", (event) => {
            const { nik, aksi } = event.data;
            if (aksi === "minta_data_saldo" && nik) {
                // Cari cepat dengan .find()
                let data = listSaldoLokal.find(s => String(s.nik).trim() === String(nik).trim());
                window.parent.postMessage({
                    aksi: "kirim_saldo_ke_pop",
                    saldoRaw: data ? data.tabungan : 0,
                    poinHarian: data ? data.poin : 0,
                    nik: nik
                }, "*");
            }
        });

        unduhData();
        setInterval(unduhData, 5 * 60 * 1000); // Sync tiap 5 menit
    </script>
</head>
<body></body>
</html>
