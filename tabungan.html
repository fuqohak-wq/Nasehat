<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-transparent overflow-hidden text-slate-100">

    <script>
        const API_TABUNGAN = "https://script.google.com/macros/s/AKfycbxVH7-d8GrgHjaDeT15az9zsHvwVedApP2IKBXl8ObIfexlmJG_-qCveSfmh7SL5cuX/exec";
        let listSaldoLokal = [];

        async function unduhSemuaSaldo() {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") {
                    listSaldoLokal = json.data;
                    console.log("Widget Tabungan: Sync latar belakang berhasil.");
                }
            } catch (e) { console.error("Widget Tabungan: Gagal offline sync.", e); }
        }

        // FUNGSI INTI: Ambil data langsung dari cloud secara paksa demi keakuratan real-time saat scan sukses
        async function ambilSaldoSpesifikRealtime(nik, nama) {
            try {
                const res = await fetch(`${API_TABUNGAN}?aksi=ambil_database`, { method: "GET" });
                const json = await res.json();
                if (json.status === "success") {
                    listSaldoLokal = json.data;
                    let NIK_Target = nik.toString().trim();
                    let dataSantri = listSaldoLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);
                    
                    let saldoFinal = dataSantri ? dataSantri.tabungan : 0;
                    let poinHariIni = dataSantri && dataSantri.poin !== undefined ? parseInt(dataSantri.poin) : 0;

                    // Kirim balik ke index.html secara instan
                    window.parent.postMessage({
                        aksi: "kirim_saldo_ke_pop",
                        saldoRaw: saldoFinal,
                        nama: nama,
                        nik: NIK_Target,
                        poinHarian: poinHariIni
                    }, "*");
                }
            } catch (e) {
                // Fallback jika fetch realtime gagal, gunakan data lokal cache
                kirimDataDariCache(nik, nama);
            }
        }

        function kirimDataDariCache(nik, nama) {
            let NIK_Target = nik.toString().trim();
            let dataSantri = listSaldoLokal.find(s => s.nik && s.nik.toString().trim() === NIK_Target);
            let saldoFinal = dataSantri ? dataSantri.tabungan : 0;
            let poinHariIni = dataSantri && dataSantri.poin !== undefined ? parseInt(dataSantri.poin) : 0;

            window.parent.postMessage({
                aksi: "kirim_saldo_ke_pop",
                saldoRaw: saldoFinal,
                nama: nama,
                nik: NIK_Target,
                poinHarian: poinHariIni
            }, "*");
        }

        window.addEventListener("message", (event) => {
            const { nik, nama, aksi } = event.data;
            if (nik) {
                if (aksi === "minta_data_saldo_realtime") {
                    // Dipanggil setelah sukses nembak absen ke cloud
                    ambilSaldoSpesifikRealtime(nik, nama);
                } else if (aksi === "minta_data_saldo") {
                    kirimDataDariCache(nik, nama);
                }
            }
        });

        unduhSemuaSaldo();
        setInterval(unduhSemuaSaldo, 5 * 60 * 1000);
    </script>
</body>
</html>
